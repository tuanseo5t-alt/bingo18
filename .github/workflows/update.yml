name: Sync data from data-update branch

on:
  push:
    branches:
      - data-update
  workflow_dispatch:

# GitHub Actions' shared IP range is blocked by Cloudflare on Vietlott's
# site (HTTP 403), so live data cannot be fetched from CI. Instead this
# workflow mirrors data from the ``data-update`` branch -- which is
# pushed by maintainers running the fetcher on an unblocked egress IP
# -- directly into ``main``.
#
# Workflow:
#   1. ``git fetch origin data-update``.
#   2. If ``data-update`` has commits that ``main`` lacks, fast-forward
#      ``main`` to include them (creating a merge commit if histories
#      diverged) and push.
#   3. If they are in sync, exit cleanly without producing noise.
#
# The branch can stay around; pushing the same commits again is a no-op.

permissions:
  contents: write

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Merge data-update into main
        run: |
          set -euo pipefail
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git fetch origin data-update

          DATA_SHA=$(git rev-parse origin/data-update)
          MAIN_SHA=$(git rev-parse origin/main)

          echo "data-update: $DATA_SHA"
          echo "main       : $MAIN_SHA"

          if git merge-base --is-ancestor "$DATA_SHA" "$MAIN_SHA"; then
            echo "main already contains data-update; nothing to merge."
            exit 0
          fi

          if git merge-base --is-ancestor "$MAIN_SHA" "$DATA_SHA"; then
            echo "main is an ancestor of data-update; fast-forwarding."
            git merge --ff-only origin/data-update
            git push origin main
            exit 0
          fi

          echo "Histories diverged; creating merge commit."
          git merge --no-ff origin/data-update \
            -m "Sync data from data-update ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push origin main
