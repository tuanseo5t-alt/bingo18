name: Update Bingo18 data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/7 * * * *'  # Every 7 minutes (Bingo18 draws every ~6 minutes)

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml pydantic pandas pyarrow

      - name: Fetch latest draws
        run: python src/fetch_bingo18.py --once

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          if git diff --staged --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "Update Bingo18: $(date +'%Y-%m-%d %H:%M UTC')"
          git push