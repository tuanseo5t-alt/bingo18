name: Update Bingo18 data

on:
  workflow_dispatch:
  schedule:
    # Bingo18 draws every ~6 minutes between 06:00 and 21:53 (UTC+7).
    # Polling at the minimum 5-minute cron cadence plus the fetcher's
    # Ajax back-fill keeps every draw even when a run is delayed.
    - cron: '*/5 * * * *'

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install --quiet --upgrade cloudscraper beautifulsoup4 lxml pydantic pandas pyarrow "curl_cffi>=0.15.0"

      # Cloudflare hard-blocks the GitHub Actions IP range with HTTP 403.
      # The fetcher rotates through multiple Chrome impersonate profiles
      # and an optional proxy pool to bypass this. Configure BINGO18_PROXIES
      # as a repository secret holding a semicolon-separated list of
      # `http://user:pass@host:port` URLs (or leave it empty to use the
      # direct runner IP, which usually fails on Actions).
      - name: Forward proxy secret
        env:
          BINGO18_PROXIES: ${{ secrets.BINGO18_PROXIES }}
        run: |
          if [ -n "$BINGO18_PROXIES" ]; then
            echo "BINGO18_PROXIES length: $(printf '%s' "$BINGO18_PROXIES" | wc -c) chars"
          else
            echo "BINGO18_PROXIES is empty; fetcher will try direct egress"
          fi

      - name: Fetch latest draws
        env:
          BINGO18_PROXIES: ${{ secrets.BINGO18_PROXIES }}
        run: python src/fetch_bingo18.py --once

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          if git diff --staged --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          git commit -m "Update Bingo18: $(date +'%Y-%m-%d %H:%M UTC')"
          git push